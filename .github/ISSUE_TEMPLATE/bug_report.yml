name: Bug report
description: Report something that isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect to happen instead?
      placeholder: Tell us what you see.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please include exact steps so we can reproduce.
      placeholder: |
        1. Open the app
        2. Tap ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: ios
    attributes:
      label: iOS version
      placeholder: "e.g. 18.4"
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device / Simulator
      placeholder: "e.g. iPhone 15 Pro (simulator)"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant console logs or attach screenshots.
    validations:
      required: false

